name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test (also rebuilds via `test` script)
        run: bun run test

      # Drift guard: if src/ changed without hooks/hook.js being rebuilt, the
      # freshly-built file will differ from what was committed. `git diff
      # --exit-code` returns non-zero when there are changes, which fails the
      # job and points the contributor at the missing build step.
      - name: Check hooks/hook.js is in sync with src/
        run: |
          git diff --exit-code hooks/ \
            || (echo "::error::hooks/hook.js is out of sync with src/. Run 'bun run build' and commit the updated file."; exit 1)
