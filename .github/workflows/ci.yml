name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test (also rebuilds via `test` script)
        run: bun run test

      # Drift guard: if packages/*/src/ changed without hooks/hook.js being
      # rebuilt, the freshly-built file will differ from what was committed.
      # `git diff --exit-code` returns non-zero when there are changes, which
      # fails the job and points the contributor at the missing build step.
      #
      # Linux-only: on Windows, git's default autocrlf would false-positive
      # the check from CRLF normalization, not a real build-output mismatch.
      - name: Check hooks/hook.js is in sync with packages/claude/src
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          git diff --exit-code hooks/ \
            || (echo "::error::hooks/hook.js is out of sync with packages/claude/src. Run 'bun run build' and commit the updated file."; exit 1)
